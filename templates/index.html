<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Phân Ca Nấu Cơm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <h2 class="text-center text-primary mb-4">🍳 Hệ Thống Phân Ca Nấu Cơm Tự Động</h2>

    <div id="login-section" class="card shadow-sm p-4 mx-auto" style="max-width: 400px;">
        <h4 class="text-center">Đăng Nhập</h4>
        <div class="mb-3">
            <label class="form-label">Nhập User ID của bạn:</label>
            <input type="text" id="userIdInput" class="form-control" placeholder="Ví dụ: 123e4567-e89b-12d3...">
        </div>
        <button onclick="login()" class="btn btn-primary w-100">Đăng Nhập</button>
        <p id="login-error" class="text-danger mt-2 text-center"></p>
    </div>

    <div id="dashboard-section" style="display: none;">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h4 id="welcome-text" class="text-success"></h4>
            <div>
                <button id="btn-generate" onclick="generateShifts()" class="btn btn-warning" style="display: none;">📅 Tạo lịch tuần mới</button>
                <button onclick="logout()" class="btn btn-outline-danger">Đăng Xuất</button>
            </div>
        </div>

        <div class="card shadow-sm">
            <div class="card-body">
                <table class="table table-hover table-bordered text-center align-middle">
                    <thead class="table-dark">
                        <tr>
                            <th>Ngày</th>
                            <th>Bữa</th>
                            <th>Thời Gian</th>
                            <th>Trạng Thái</th>
                            <th>Người Phụ Trách</th>
                            <th id="col-action" style="display: none;">Hành Động (AI)</th>
                        </tr>
                    </thead>
                    <tbody id="schedule-body">
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="aiModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title">🤖 Trợ Lý AI Gợi Ý Người Nấu</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="table-responsive">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>Họ Tên</th>
                                <th>Định mức</th>
                                <th>Đã nấu</th>
                                <th>Độ Ưu Tiên</th>
                                <th>Chốt Ca</th>
                            </tr>
                        </thead>
                        <tbody id="ai-suggestions-body">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    // Vì Frontend và Backend giờ ở chung nhà, ta bỏ trắng API_BASE để nó tự gọi chính host của nó
    const API_BASE = "";
    let currentRole = "";
    let currentShiftId = null;

    async function apiCall(endpoint, method = "GET", body = null) {
        const token = localStorage.getItem("token");
        const headers = { "Content-Type": "application/json" };
        if (token) headers["Authorization"] = "Bearer " + token;

        const response = await fetch(API_BASE + endpoint, {
            method: method,
            headers: headers,
            body: body? JSON.stringify(body) : null
        });
        return response;
    }

    async function login() {
        const userId = document.getElementById("userIdInput").value.trim();
        const res = await apiCall("/login/", "POST", { user_id: userId });
        
        if (res.ok) {
            const data = await res.json();
            localStorage.setItem("token", data.access_token);
            localStorage.setItem("role", data.role);
            currentRole = data.role;
            
            document.getElementById("login-section").style.display = "none";
            document.getElementById("dashboard-section").style.display = "block";
            document.getElementById("welcome-text").innerText = `Xin chào! Quyền của bạn: ${data.role.toUpperCase()}`;
            
            if (data.role === "leader") {
                document.getElementById("btn-generate").style.display = "inline-block";
                document.getElementById("col-action").style.display = "table-cell";
            }
            loadSchedule();
        } else {
            document.getElementById("login-error").innerText = "ID không hợp lệ hoặc không tồn tại!";
        }
    }

    async function loadSchedule() {
        const res = await apiCall("/shifts/schedule");
        if (res.ok) {
            const data = await res.json();
            const tbody = document.getElementById("schedule-body");
            tbody.innerHTML = "";

            data.lich_nau_com.forEach(ca => {
                let actionHtml = "";
                if (currentRole === "leader") {
                    if (ca.trang_thai === "Chưa phân người") {
                        actionHtml = `<button onclick="openAIModal(${ca.shift_id})" class="btn btn-sm btn-primary">Gợi ý AI</button>`;
                    } else {
                        actionHtml = `<span class="badge bg-success">Đã chốt</span>`;
                    }
                }

                tbody.innerHTML += `
                    <tr>
                        <td>${ca.ngay}</td>
                        <td><strong>${ca.bua}</strong></td>
                        <td>${ca.thoi_gian}</td>
                        <td><span class="badge ${ca.trang_thai === 'Chưa phân người'? 'bg-secondary' : 'bg-success'}">${ca.trang_thai}</span></td>
                        <td class="text-primary fw-bold">${ca.nguoi_phu_trach}</td>
                        ${currentRole === "leader"? `<td>${actionHtml}</td>` : ""}
                    </tr>
                `;
            });
        }
    }

    async function generateShifts() {
        // Bổ sung  để lấy chính xác chuỗi YYYY-MM-DD
        const today = new Date().toISOString().split('T'); 
        
        const res = await apiCall("/shifts/generate", "POST", { start_date: today, days: 7 });
        if (res.ok) {
            alert("Đã tạo lịch cho 7 ngày tới thành công!");
            loadSchedule();
        } else {
            // Ép hệ thống in ra chi tiết lỗi nếu có để dễ dàng bắt bệnh
            const errorData = await res.json();
            alert("Chi tiết lỗi từ máy chủ:\n" + JSON.stringify(errorData, null, 2));
        }
    }

    async function openAIModal(shiftId) {
        currentShiftId = shiftId;
        const res = await apiCall(`/shifts/${shiftId}/suggestions`);
        if (res.ok) {
            const data = await res.json();
            const tbody = document.getElementById("ai-suggestions-body");
            tbody.innerHTML = "";

            data.danh_sach_goi_y.forEach((user, index) => {
                const isTop1 = index === 0;
                tbody.innerHTML += `
                    <tr class="${isTop1? 'table-warning fw-bold' : ''}">
                        <td>${user.full_name} ${isTop1? '⭐' : ''}</td>
                        <td>${user.target}</td>
                        <td>${user.completed}</td>
                        <td><span class="badge bg-danger">${user.priority_score} điểm</span></td>
                        <td><button onclick="assignUser('${user.user_id}')" class="btn btn-sm btn-success">Chốt người này</button></td>
                    </tr>
                `;
            });
            new bootstrap.Modal(document.getElementById('aiModal')).show();
        }
    }

    async function assignUser(userId) {
        const res = await apiCall(`/shifts/${currentShiftId}/assign`, "POST", { user_id: userId });
        if (res.ok) {
            alert("Chốt ca thành công!");
            bootstrap.Modal.getInstance(document.getElementById('aiModal')).hide();
            loadSchedule(); 
        }
    }

    function logout() {
        localStorage.clear();
        location.reload();
    }
</script>
</body>
</html>
